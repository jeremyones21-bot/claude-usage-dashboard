<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Usage</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='7' fill='%232a78d6'/%3E%3C/svg%3E">
</head>
<body>
  <header>
    <h1>Claude Usage</h1>
    <span class="meta" id="last-updated"></span>
    <span class="spacer"></span>
    <span class="meta" id="poll-status"></span>
  </header>

  <section class="cards" id="cards"></section>

  <div class="controls">
    <button data-hours="24">24h</button>
    <button data-hours="72">3d</button>
    <button data-hours="168" aria-pressed="true">7d</button>
    <button data-hours="720">30d</button>
    <span class="spacer"></span>
    <button id="table-toggle" aria-pressed="false">Table view</button>
  </div>

  <section id="charts"></section>
  <section id="table-view" hidden></section>

  <footer id="footer"></footer>

  <div class="tooltip" id="tooltip"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
